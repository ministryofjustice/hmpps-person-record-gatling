name: Gatling performance test run

on:
  schedule:
    - cron: '0 8 * * 1-5'
  push:
    branches: [ "CPR-1262" ]
  workflow_dispatch:
    inputs:
      envName:
        description: "Which API should this run against"
        required: false
        default: "dev"
        type: choice
        options:
          - dev
      profile:
        description: "Optional Which profile to run."
        required: false
        default: "happypath"
        type: choice
        options:
          - local
          - worstcase
          - happypath
      duration:
        description: "The execution time"
        required: false
        default: "360"
        type: string
jobs:
  gatling-run:
    name: Run Gatling simulations
    runs-on: [ self-hosted, hmpps-github-actions-runner ]
    permissions:
      contents: read
      actions: read
    timeout-minutes: 300
    env:
      CLIENT_ID: ${{ secrets.GATLING_CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.GATLING_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Touch env file
        run: touch .env

      - name: Start Gatling
        env:
          CLIENT_ID: ${{ secrets.GATLING_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.GATLING_CLIENT_SECRET }}
        run: |
         
          PROFILE="${{ github.event.inputs.profile }}"
          PROFILE="${PROFILE:-happypath}"
          ENV="${{ github.event.inputs.envName }}"
          ENV="${ENV:-dev}"
          DURATION="${{ github.event.inputs.duration }}"
          DURATION="${DURATION:-360}"
          set -eo pipefail
          
          CLIENT_ID="${CLIENT_ID}" \
          CLIENT_SECRET="${CLIENT_SECRET}" \
          ./gradlew gatlingRunCi \
          --no-daemon \
          -Dprofile="$PROFILE" \
          -Denv="$ENV" \
          -Dduration="$DURATION"


      - name: Upload Gatling reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gatling-reports
          path: |
            gatling/build/reports/gatling/**
            **/build/reports/gatling/**
          if-no-files-found: warn



      - name: Slack Notification
        uses: slackapi/slack-github-action@v2.1.1
        with:
            method: chat.postMessage
            token: ${{ secrets.HMPPS_SLACK_BOT_TOKEN }}
            payload: |
              channel: "#hmpps-person-record-alerts"
              attachments:
                - color: "#df2c2c"
                  blocks:
                    - type: section
                      text:
                        type: mrkdwn
                        text: "❌ *Gatling Performance Test Failure*\n*Repository:* ${{ github.repository }}\n*Branch:* `${{ github.ref_name }}`\n*Workflow Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"