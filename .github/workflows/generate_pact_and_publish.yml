name: Pact Build and Publish

on:
  push:
    branches: [ "cpr-soak-test" ]
  workflow_call:
    inputs:
      additional_docker_tag:
        description: Additional Docker tag to pass
        required: false
        type: string
        default: ''
      push:
        description: Push Docker image to registry
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  node_build_and_publish_pacts:
    name: Node Build and Publish Pacts
    runs-on: ubuntu-latest
    env:
      PACT_BROKER_BASE_URL: 'https://pact-broker-prod.apps.live-1.cloud-platform.service.justice.gov.uk'
      PACT_BROKER_USERNAME: 'interventions'
      PACT_BROKER_PASSWORD: ${{ secrets.HMPPS_PACT_BROKER_PASSWORD }}
      GITHUB_SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run pact tests
        run: ./gradlew cleanTest test --info

      - name: Upload Pact files as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pacts
          path: build/pacts

      - name: Publish Pact files to broker
        run: ./gradlew pactPublish
